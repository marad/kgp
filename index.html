<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Korona Gór Polskich — mapa zdobytych szczytów</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="topbar">
    <h1>Korona Gór Polskich</h1>
    <div id="progress">
      <div id="progress-count">–/28</div>
      <div id="progress-bar"><span id="progress-fill"></span></div>
    </div>
  </header>

  <div id="map"></div>

  <div id="legend">
    <div class="legend-row"><span class="dot dot-visited"></span> Zdobyty szczyt</div>
    <div class="legend-row"><span class="dot dot-todo"></span> Do zdobycia</div>
    <div class="legend-row"><span class="dot dot-city"></span> Miasto (punkt odniesienia)</div>
    <div class="legend-sep"></div>
    <div class="legend-row">🐕 z psem OK · 🐕 warunkowo · 🚫🐕 zakaz</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
